<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ITV Guest App</title>

    <!-- PWA. `theme-color` is filled at runtime from the hotel's brand tokens
         (see AppThemeProvider) so that no color literal lives outside tokens.ts. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ITV Guest" />
    <meta name="format-detection" content="telephone=no" />
    <!-- Redesign v2 webfonts: Prata (display, headings + accent numerals) and
         Manrope (interface). Both carry Cyrillic subsets, matching the token
         font stacks in src/theme/tokens.ts. Google Fonts is fine for dev. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Prata&display=swap&subset=cyrillic,cyrillic-ext,latin,latin-ext"
    />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
