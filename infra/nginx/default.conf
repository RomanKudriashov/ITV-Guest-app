# Реверс-прокси перед всем стендом: единственная точка входа снаружи.
# Домен нигде не захардкожен — сервер ловит любой Host (default_server), а
# разрешённые хосты проверяет Django (ALLOWED_HOSTS из APP_DOMAIN). Поэтому
# смена sslip-заглушки на реальный домен — правка .env, не этого файла.
#
# TLS пока НЕ включён (для wildcard на sslip.io сертификат не выпустить).
# Включение позже — добавление server-блока на 443 с ssl_certificate, без
# переделки этого. См. отчёт по деплою.

upstream backend {
    server backend:8000;
}

# MinIO — только внутренняя сеть compose; наружу отдаём медиа через этот прокси.
upstream minio {
    server minio:9000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Фото блюд/обложек: лимит запаса над 10 МБ прикладного ограничения.
    client_max_body_size 12m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # --- API ---------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- WebSocket (живой статус, чат трекера) ------------------------------
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # --- Медиа из MinIO (публичный бакет guest-media) ----------------------
    # Прикладные URL имеют вид /guest-media/<key>; проксируем прямо в MinIO,
    # порт наружу не публикуем.
    location /guest-media/ {
        proxy_pass http://minio;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # --- Витрина/CMS/трекер (статичная SPA) --------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
