name: itv-guest-app

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # Bootstrap-суперпользователь образа. Приложение под ним не работает —
      # суперпользователь игнорирует RLS. Рабочие роли создаёт init-скрипт.
      POSTGRES_DB: ${POSTGRES_DB:-guestapp}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      APP_DB_USER: ${POSTGRES_USER:-guestapp}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:-guestapp}
      PLATFORM_DB_USER: ${POSTGRES_PLATFORM_USER:-guestapp_platform}
      PLATFORM_DB_PASSWORD: ${POSTGRES_PLATFORM_PASSWORD:-guestapp_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d ${POSTGRES_DB:-guestapp}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_HOST_PORT:-59000}:9000"        # S3 API
      - "${MINIO_CONSOLE_HOST_PORT:-59001}:9001" # web-консоль
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    command: ["api"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHANNELS_REDIS_URL: redis://redis:6379/3
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_HOST_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build: ./backend
    command: ["worker"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHANNELS_REDIS_URL: redis://redis:6379/3
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    environment:
      VITE_API_PROXY: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-5183}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
